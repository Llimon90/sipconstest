<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPCONS - Detalle de Venta</title>
    <link rel="stylesheet" href="../css/styles.css?v=6">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <style>
        .notificacion {
            position: fixed; top: 20px; right: 20px; padding: 15px 25px;
            border-radius: 5px; color: white; font-weight: bold; z-index: 9999;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); animation: slideIn 0.3s ease-out;
        }
        .notificacion.success { background-color: #2ecc71; }
        .notificacion.error { background-color: #e74c3c; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .eliminando { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <button class="mobile-home-btn" onclick="window.location.href='../index.html'" style="display: none;">
        <i class="fas fa-home"></i> <span>Volver al Inicio</span>
    </button>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-title"><i class="fas fa-tools"></i> Panel</h2>
            <button id="toggleSidebar" class="toggle-sidebar"><i class="fas fa-chevron-left"></i></button>
        </div>
        <ul>
            <li><a href="../index.html"><i class="fas fa-home"></i> <span class="sidebar-link-text">Inicio</span></a></li>
            <li><a href="incidencias.html"><i class="fas fa-tasks"></i> <span class="sidebar-link-text">Incidencias</span></a></li>
            <li><a href="reportes.html"><i class="fas fa-search"></i> <span class="sidebar-link-text">Buscar Incidencias</span></a></li>
            <li><a href="clientes.html"><i class="fas fa-users"></i> <span class="sidebar-link-text">Clientes</span></a></li>
            <li><a href="usuarios.html"><i class="fas fa-user-friends"></i> <span class="sidebar-link-text">Usuarios</span></a></li>
            <li><a href="ventas.html" class="active"><i class="fas fa-chart-line"></i> <span class="sidebar-link-text">Ventas</span></a></li>
            <li><a href="ajustes.html"><i class="fas fa-cog"></i> <span class="sidebar-link-text">Ajustes</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="user-info"><i class="fas fa-user-circle"></i> <span class="user-name">Administrador</span></div>
        </div>
    </aside>

    <main id="mainContent">
        <section class="encabezado">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2><i class="fas fa-edit"></i> Detalles de la Venta <span id="txt-folio" style="color: #3498db;"></span></h2>
                <div>
                    <button type="button" onclick="window.location.href='admin-ventas.html'" style="padding: 10px 15px; background: #95a5a6; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px;">
                        <i class="fas fa-arrow-left"></i> Regresar
                    </button>
                    <button type="button" id="btn-eliminar-venta" style="padding: 10px 15px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer;">
                        <i class="fas fa-trash-alt"></i> Eliminar Venta
                    </button>
                </div>
            </div>

            <form id="form-editar-venta" enctype="multipart/form-data">
                <input type="hidden" id="venta_id" name="venta_id">

                <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                    <div style="flex: 1;">
                        <label>CLIENTE:</label>
                        <input type="text" id="cliente" name="cliente" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <div style="flex: 1;">
                        <label>SUCURSAL:</label>
                        <input type="text" id="sucursal" name="sucursal" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                </div>

                <div style="display: flex; gap: 20px; margin-bottom: 15px;">
                    <div style="flex: 1;">
                        <label>EQUIPO:</label>
                        <input type="text" id="equipo" name="equipo" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <div style="flex: 1;">
                        <label>MARCA:</label>
                        <input type="text" id="marca" name="marca" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <div style="flex: 1;">
                        <label>MODELO:</label>
                        <input type="text" id="modelo" name="modelo" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                </div>

                <div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start;">
                    <div style="flex: 1;">
                        <label>CANTIDAD:</label>
                        <input type="number" id="qty" name="qty" min="1" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-weight: bold;">
                    </div>
                    <div style="flex: 1;">
                        <label>GARANTÍA (MESES):</label>
                        <input type="number" id="garantia" name="garantia" min="0" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    <div style="flex: 1;">
                        <label>CALIBRACIÓN RECOMENDADA (MESES):</label>
                        <input type="number" id="calibracion" name="calibracion" min="0" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    </div>
                    
                    <div style="flex: 1;">
                        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-top: 10px;">
                            <input type="checkbox" id="servicio" name="servicio" style="width: 20px; height: 20px;">
                            <strong>CLÁUSULA DE SERVICIO</strong>
                        </label>
                        
                        <div id="contenedor-frecuencia" style="display: none; margin-top: 10px; background: #f1f5f9; padding: 10px; border-radius: 5px; border-left: 3px solid #3498db;">
                            <label style="font-size: 0.8rem; font-weight: bold; color: #2c3e50;">
                                <i class="fas fa-calendar-alt"></i> FRECUENCIA (MESES):
                            </label>
                            <input type="number" id="frecuencia_servicio" name="frecuencia_servicio" min="1" placeholder="Ej. 6" style="width: 100%; padding: 5px; margin-top: 5px; border: 1px solid #ccc; border-radius: 3px;">
                        </div>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label><strong>NÚMEROS DE SERIE:</strong></label>
                    <div id="container-series-edit" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 10px; background: #f8f9fa; padding: 15px; border-radius: 5px;">
                        </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label>NOTAS ADICIONALES:</label>
                    <textarea id="notas" name="notas" style="width: 100%; height: 80px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"></textarea>
                </div>


                        <section class="archivos-incidencia" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
            <h2><i class="fas fa-folder-open"></i> Archivos de la Venta</h2>
            
            <div id="contenedor-archivos" style="display: flex; flex-wrap: wrap; margin-bottom: 20px;">
                <p style="color: #7f8c8d;">Cargando archivos...</p>
            </div>

            <div style="border-top: 1px solid #eee; padding-top: 20px;">
                <label><strong>AGREGAR NUEVOS ARCHIVOS:</strong></label><br><br>
                <input type="file" id="nuevos_facturas" name="nuevos_facturas[]" multiple form="form-editar-venta"
                       accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,.doc,.docx,.xls,.xlsx"
                       style="width: 100%; max-width: 500px; padding: 10px; border: 1px dashed #ccc; border-radius: 5px; background: #fafafa;">
                <p style="font-size: 12px; color: #e74c3c; margin-top: 8px;">
                    <i class="fas fa-info-circle"></i> Selecciona los archivos y da clic en "Guardar Cambios de la Venta" arriba para subirlos.
                </p>
            </div>
        </section>

                <div style="margin-bottom: 30px;">
                    <button type="button" id="btn-guardar-cambios" style="padding: 12px 25px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s;">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </section>
        

    </main>

    <script src="../scripts/sidebar-state.js"></script>
    <script src="../scripts/detalles-venta.js?v=7"></script> 
</body>
</html>
