<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPCONS - Administrar Venta</title>
  <link rel="stylesheet" href="../css/styles.css?v=3">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="../scripts/detalles-venta.js?v=2" defer></script>
</head>
<body>
  <div class="retorna">
    <a href="ventas.html"><i class="fas fa-arrow-left"></i> Regresar a Ventas</a>
  </div>

  <aside class="sidebar">
    </aside>

  <main id="mainContent">
    <section class="encabezado">
      <div style="display: flex; justify-content: space-between; align-items: center;">
          <h2><i class="fas fa-edit"></i> Administrar Venta <span id="txt-folio" class="badge-folio">...</span></h2>
          <button id="btn-eliminar-venta" class="btn-danger" style="background:#e74c3c; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer;">
              <i class="fas fa-trash"></i> Eliminar Venta Completa
          </button>
      </div>
      
      <form id="form-editar-venta" enctype="multipart/form-data" style="margin-top: 20px;">
        <input type="hidden" id="venta_id" name="venta_id">

        <div class="form-row">
          <div>
            <label for="cliente"><i class="fas fa-building"></i> Cliente:</label>
            <input type="text" id="cliente" name="cliente" required>
          </div>
          <div>
            <label for="sucursal"><i class="fas fa-store"></i> Sucursal:</label>
            <input type="text" id="sucursal" name="sucursal">
          </div>
        </div>

        <div class="form-row">
          <div>
            <label for="equipo"><i class="fas fa-desktop"></i> Equipo:</label>
            <input type="text" id="equipo" name="equipo" required>
          </div>
          <div>
            <label for="marca"><i class="fas fa-tag"></i> Marca:</label>
            <input type="text" id="marca" name="marca" required>
          </div>
        </div>

        <div class="form-row">
          <div class="full-width">
            <label for="modelo"><i class="fas fa-cube"></i> Modelo:</label>
            <input type="text" id="modelo" name="modelo" required>
          </div>
        </div>

        <div class="form-row">
          <div>
            <label for="garantia"><i class="fas fa-shield-alt"></i> Garantía (meses):</label>
            <input type="number" id="garantia" name="garantia" min="0">
          </div>
          <div>
            <label for="calibracion"><i class="fas fa-tools"></i> Calibración (meses):</label>
            <input type="number" id="calibracion" name="calibracion" min="0">
          </div>
          <div class="checkbox-container">
            <label class="checkbox-label">
              <input type="checkbox" id="servicio" name="servicio">
              <span class="checkmark"></span>
              <i class="fas fa-concierge-bell"></i> Cláusula de servicio
            </label>
          </div>
        </div>

        <div class="form-row">
            <div class="full-width">
                <h4><i class="fas fa-barcode"></i> Números de Serie Registrados</h4>
                <div id="container-series-edit" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;">
                    </div>
            </div>
        </div>

        <div class="form-row">
          <div class="full-width">
            <label for="notas"><i class="fas fa-sticky-note"></i> Notas:</label>
            <textarea id="notas" name="notas" rows="3"></textarea>
          </div>
        </div>

        <div class="form-row" style="background: #f8f9fa; padding: 15px; border-radius: 8px;">
            <div class="full-width">
                <h4><i class="fas fa-folder-open"></i> Archivos Adjuntos Actuales</h4>
                <ul id="lista-archivos-admin" style="list-style: none; padding: 0; margin-bottom: 20px;">
                    </ul>
                <hr style="border-top: 1px solid #ddd; margin: 15px 0;">
                <label for="nuevos_facturas"><i class="fas fa-upload"></i> Agregar nuevos archivos:</label>
                <input type="file" id="nuevos_facturas" name="nuevos_facturas[]" accept=".pdf, .jpg, .png, .docx" multiple class="form-control">
            </div>
        </div>

        <div class="form-row">
          <button type="button" id="btn-guardar-cambios" class="btn-primary" style="width: 100%; padding: 15px; font-size: 1.1rem;">
            <i class="fas fa-save"></i> Guardar Cambios
          </button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
